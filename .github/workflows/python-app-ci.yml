# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions


name: GitHub Actions for vlei-verifier
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macOS-15, ubuntu-latest ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12.2
        uses: actions/setup-python@v5
        with:
          python-version: 3.12.2
      - name: Install libsodium
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            brew install libsodium pkg-config
            SODIUM_PREFIX="$(brew --prefix libsodium)"
            echo "SODIUM_PREFIX=$SODIUM_PREFIX" >> $GITHUB_ENV
      
            # Runtime discovery (this is the important part for pysodium import)
            echo "DYLD_FALLBACK_LIBRARY_PATH=$SODIUM_PREFIX/lib:/usr/local/lib:/usr/lib" >> $GITHUB_ENV
      
            # Build-time helpers (safe to set; useful if anything compiles/links)
            echo "PKG_CONFIG_PATH=$SODIUM_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
            echo "LDFLAGS=-L$SODIUM_PREFIX/lib $LDFLAGS" >> $GITHUB_ENV
            echo "CPPFLAGS=-I$SODIUM_PREFIX/include $CPPFLAGS" >> $GITHUB_ENV
          else
            sudo apt-get install -y libsodium-dev
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest hio
          export SODIUM_INSTALL=bundled
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint changes
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --ignore=E7,F841,E301,E302,E303 --max-complexity=10 --max-line-length=127 --statistics
      - name: Run core tests
        run: |
          pytest tests/

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.12.2
        uses: actions/setup-python@v2
        with:
          python-version: 3.12.2
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov hio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run core vlei-verifier tests
        run: |
          pytest --cov=./ --cov-report=xml
      - name: Upload
        uses: codecov/codecov-action@v3
      - name: Run tests with coverage
        run: |
          pytest --cov=./src/verifier/core --cov-report=term-missing --cov-fail-under=50
